name: 🔗 GHA for the PR
run-name: |
  ${{
    (github.event.pull_request.draft && format('📝 Draft PR | {0}', github.event.pull_request.title))
    || format('🔁 Open PR | {0}', github.event.pull_request.title)
  }}

on: [pull_request]

concurrency:
  group: ci-${{ github.actor }}-${{ github.head_ref || github.run_number }}-${{ github.ref }}-pr_runner
  cancel-in-progress: true

jobs:
  static-checks:
    name: 📊 Static
    uses: ./.github/workflows/static_checks.yml

  windows-build:
    name: 🏁 Windows
    needs: static-checks
    uses: ./.github/workflows/windows_builds.yml

  emscripten-build:
    name: 🌐 Emscripten
    needs: static-checks
    uses: ./.github/workflows/emscripten_builds.yml

  deploy-web-editor:
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: emscripten-build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: emscripten-editor
          path: "${{ runner.temp }}/emscripten-editor/"

      - name: Prepare dist
        shell: bash
        run: |
          mkdir web-editor-dist && cd $_
          7z x "${{ runner.temp }}/emscripten-editor/godot.emscripten.opt.tools.threads.zip"
          mv -f godot.tools.html index.html

          cat > _headers << 'EOF'
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
          EOF

      - name: Deploy to Cloudflare Pages
        uses: andykenward/github-actions-cloudflare-pages@v3.3.2
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-project-name: ${{ vars.CLOUDFLARE_PROJECT_NAME }}
          directory: web-editor-dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-environment: 'web-editor-preview'
